apiVersion: v1
kind: Namespace
metadata:
  name: vuln-test
---
# ── Clean nginx (stable-alpine) ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clean-nginx
  namespace: vuln-test
  labels:
    app: clean-nginx
    test-type: clean
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clean-nginx
  template:
    metadata:
      labels:
        app: clean-nginx
        test-type: clean
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: nginx
          image: __ACR_LOGIN_SERVER__/clean/nginx:stable-alpine
          ports:
            - containerPort: 80
          resources:
            limits:
              memory: "128Mi"
              cpu: "100m"
---
# ── Clean Redis (alpine) ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clean-redis
  namespace: vuln-test
  labels:
    app: clean-redis
    test-type: clean
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clean-redis
  template:
    metadata:
      labels:
        app: clean-redis
        test-type: clean
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: redis
          image: __ACR_LOGIN_SERVER__/clean/redis:alpine
          ports:
            - containerPort: 6379
          resources:
            limits:
              memory: "128Mi"
              cpu: "100m"
