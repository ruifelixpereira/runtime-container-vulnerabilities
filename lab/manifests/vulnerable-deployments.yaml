apiVersion: v1
kind: Namespace
metadata:
  name: vuln-test
---
# ── Vulnerable nginx (1.14.0) ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vuln-nginx
  namespace: vuln-test
  labels:
    app: vuln-nginx
    test-type: vulnerable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vuln-nginx
  template:
    metadata:
      labels:
        app: vuln-nginx
        test-type: vulnerable
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: nginx
          image: __ACR_LOGIN_SERVER__/vuln/nginx:1.16.0
          ports:
            - containerPort: 80
          resources:
            limits:
              memory: "128Mi"
              cpu: "100m"
---
# ── Vulnerable Node.js (12-alpine, EOL) ────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vuln-node
  namespace: vuln-test
  labels:
    app: vuln-node
    test-type: vulnerable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vuln-node
  template:
    metadata:
      labels:
        app: vuln-node
        test-type: vulnerable
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: node
          image: __ACR_LOGIN_SERVER__/vuln/node:14-alpine
          command: ["node", "-e", "setInterval(() => {}, 60000)"]
          resources:
            limits:
              memory: "128Mi"
              cpu: "100m"
---
