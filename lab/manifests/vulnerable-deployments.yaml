# ── Vulnerable PostgreSQL (9.6, EOL) ───────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vuln-postgres
  namespace: vuln-test
  labels:
    app: vuln-postgres
    test-type: vulnerable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vuln-postgres
  template:
    metadata:
      labels:
        app: vuln-postgres
        test-type: vulnerable
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: postgres
          image: __ACR_LOGIN_SERVER__/vuln/postgres:12.2
          env:
            - name: POSTGRES_PASSWORD
              value: "testonly-not-production"
          ports:
            - containerPort: 5432
          resources:
            limits:
              memory: "256Mi"
              cpu: "200m"
